services:
  beb:
    build:
      context: .
      dockerfile: Dockerfile
    image: blackbear-edge-bridge:local
    container_name: beb
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      DATABASE_PATH: /app/data/bridge.db
      BEB_API_ENABLED: "true"
      BEB_API_HOST: 0.0.0.0
      BEB_API_PORT: "8000"
    ports:
      - "${BEB_API_BIND:-127.0.0.1}:${BEB_API_HOST_PORT:-8000}:8000"
    volumes:
      - beb-sqlite-data:/app/data
    networks:
      - beb-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: beb-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_BIND:-127.0.0.1}:${MQTT_HOST_PORT:-1883}:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - beb-net
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_pub",
          "-h",
          "localhost",
          "-p",
          "1883",
          "-t",
          "beb/healthcheck",
          "-m",
          "ping",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  beb-sqlite-data:
    name: beb-sqlite-data
  mosquitto-data:
    name: beb-mosquitto-data
  mosquitto-log:
    name: beb-mosquitto-log

networks:
  beb-net:
    name: beb-net
    driver: bridge
